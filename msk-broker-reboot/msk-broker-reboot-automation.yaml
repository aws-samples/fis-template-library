description: "Reboot an Amazon MSK broker to test Kafka producer and consumer resilience"
schemaVersion: "0.3"
assumeRole: "{{ AutomationAssumeRole }}"
parameters:
  ClusterArn:
    type: String
    description: "Amazon MSK cluster ARN"
    allowedPattern: "^arn:aws:kafka:[a-z0-9\\-]+:[0-9]{12}:cluster/[^/]+/[^/]+$"
  BrokerId:
    type: String
    description: "Broker ID to reboot (e.g. 1, 2, 3). Use aws kafka list-nodes to find broker IDs."
    default: "1"
    allowedPattern: "^[1-9][0-9]*$"
  AutomationAssumeRole:
    type: String
    description: "IAM Role ARN for SSM Automation to assume"
    allowedPattern: "^arn:aws:iam::[0-9]{12}:role/.+$"

mainSteps:
  - name: RebootMskBroker
    action: aws:executeAwsApi
    description: "Issue RebootBroker on the specified MSK broker"
    onFailure: "Abort"
    inputs:
      Service: kafka
      Api: RebootBroker
      ClusterArn: "{{ ClusterArn }}"
      BrokerIds:
        - "{{ BrokerId }}"
    outputs:
      - Name: ClusterArn
        Selector: $.ClusterArn
        Type: String
      - Name: ClusterOperationArn
        Selector: $.ClusterOperationArn
        Type: String

  - name: WaitForClusterActive
    action: aws:waitForAwsResourceProperty
    description: "Wait until the MSK cluster returns to ACTIVE state after broker reboot"
    timeoutSeconds: 900
    onFailure: "Abort"
    inputs:
      Service: kafka
      Api: DescribeCluster
      ClusterArn: "{{ ClusterArn }}"
      PropertySelector: "$.ClusterInfo.State"
      DesiredValues:
        - "ACTIVE"
    isEnd: true
